<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理財計算工具 — Kevin Supply Hub</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F1F0F9;
  --surface:#FFFFFF;
  --brand:#6366F1;
  --brand-light:rgba(99,102,241,0.08);
  --emerald:#10B981;
  --emerald-light:rgba(16,185,129,0.08);
  --amber:#F59E0B;
  --amber-light:rgba(245,158,11,0.08);
  --text:#111111;
  --text-sub:#6B7280;
  --border:rgba(0,0,0,0.07);
  --shadow:0 2px 16px rgba(99,102,241,0.08);
  --shadow-hv:0 8px 32px rgba(99,102,241,0.14);
  --radius:18px;
}

body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:0 0 80px;
}

/* ── Header ── */
.page-header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:20px 24px 16px;
  text-align:center;
}
.page-header .eyebrow{
  font-family:'Montserrat',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:0.25em;
  text-transform:uppercase;color:var(--brand);margin-bottom:6px;
}
.page-header h1{
  font-family:'Montserrat',sans-serif;
  font-size:clamp(1.3rem,4vw,1.6rem);font-weight:900;
  color:var(--text);letter-spacing:-0.02em;
}
.page-header h1 span{color:var(--brand)}

/* ── Tabs ── */
.tabs{
  display:flex;gap:6px;justify-content:center;
  padding:16px 16px 0;max-width:520px;margin:0 auto;
}
.tab{
  flex:1;padding:10px 8px;border:1.5px solid var(--border);
  border-radius:12px;background:var(--surface);
  font-size:0.82rem;font-weight:700;color:var(--text-sub);
  cursor:pointer;text-align:center;
  transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;
}
.tab:hover{border-color:var(--brand);color:var(--brand)}
.tab.active{
  background:var(--brand);color:#fff;
  border-color:var(--brand);box-shadow:0 4px 16px rgba(99,102,241,0.3);
}

/* ── Card ── */
.wrapper{max-width:520px;margin:0 auto;padding:20px 16px 0}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:28px 24px;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;background:var(--accent,var(--brand));
}
.card h2{
  font-size:1.15rem;font-weight:700;color:var(--text);
  margin-bottom:6px;
}
.card .desc{
  font-size:0.82rem;color:var(--text-sub);margin-bottom:24px;line-height:1.6;
}

/* ── Form ── */
.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:0.85rem;font-weight:700;
  color:var(--text);margin-bottom:6px;
}
.form-group input,.form-group select{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:0.95rem;color:var(--text);background:#fff;
  font-family:'Noto Sans TC',sans-serif;
  outline:none;transition:border-color 0.15s;
}
.form-group input:focus,.form-group select:focus{
  border-color:var(--accent,var(--brand));
}
.form-group input::placeholder{color:#C0C5D0}

/* ── Button ── */
.btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  font-size:0.95rem;font-weight:700;cursor:pointer;
  color:#fff;background:var(--accent,var(--brand));
  font-family:'Noto Sans TC',sans-serif;
  transition:opacity 0.15s,transform 0.15s;
  box-shadow:0 4px 16px rgba(99,102,241,0.25);
}
.btn:hover{opacity:0.88;transform:translateY(-2px)}
.btn:active{transform:translateY(0)}

/* ── Results ── */
.result{display:flex;flex-direction:column;gap:12px;margin-top:24px}
.result-card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:16px 18px;
  font-size:0.9rem;color:var(--text);line-height:1.7;
  border-left:3px solid var(--accent,var(--brand));
}
.result-card span{
  color:var(--accent,var(--brand));font-weight:700;font-size:1.1rem;
}
.result-card hr{
  border:none;border-top:1px solid var(--border);margin:8px 0;
}
.result-card-title{
  font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.9rem;
}
.result-note{
  font-size:0.78rem;color:var(--text-sub);text-align:center;
  line-height:1.6;margin-top:8px;
}

/* ── DSP5 notes ── */
.dsp5-notes{
  margin-top:20px;padding:16px 18px;
  background:var(--brand-light);border-radius:12px;
  border:1px solid rgba(99,102,241,0.1);
}
.dsp5-notes h3{
  font-size:0.82rem;font-weight:700;color:var(--brand);margin-bottom:10px;
}
.dsp5-notes ul{list-style:none}
.dsp5-notes li{
  font-size:0.8rem;color:var(--text-sub);margin-bottom:6px;line-height:1.5;
}
.dsp5-notes a{color:var(--brand);text-decoration:underline}

/* ── Leverage table ── */
.lev-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:0.9rem}
.lev-table th,.lev-table td{
  padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border);
}
.lev-table th{
  font-size:0.8rem;font-weight:700;color:var(--text-sub);
  background:var(--amber-light);
}
.lev-table td{font-weight:600;color:var(--text)}

/* ── Loading ── */
.loading-emoji{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:12rem;display:none;z-index:50;
}
@keyframes shake{
  0%{transform:translate(-50%,-50%) translateX(0)}
  20%{transform:translate(-50%,-50%) translateX(-10px)}
  40%{transform:translate(-50%,-50%) translateX(10px)}
  60%{transform:translate(-50%,-50%) translateX(-10px)}
  80%{transform:translate(-50%,-50%) translateX(10px)}
  100%{transform:translate(-50%,-50%) translateX(0)}
}
.shaking{display:block;animation:shake 1s ease-in-out}

.hidden{display:none}

/* ── Footer ── */
.page-footer{
  text-align:center;padding-top:40px;
  font-size:11px;color:#B0B7C3;letter-spacing:0.05em;
}
.page-footer span{color:var(--brand)}

/* ── Mobile ── */
@media(max-width:480px){
  .card{padding:22px 18px;border-radius:14px}
  .tabs{gap:4px;padding:12px 12px 0}
  .tab{font-size:0.75rem;padding:9px 4px}
  .wrapper{padding:16px 12px 0}
}
</style>
</head>
<body>

<!-- Kevin Supply Hub Back Button -->
<style>
@keyframes ks-wiggle {
  0%,100% { transform: rotate(0deg) scale(1); }
  15%      { transform: rotate(-6deg) scale(1.05); }
  30%      { transform: rotate(5deg) scale(1.05); }
  45%      { transform: rotate(-4deg) scale(1.02); }
  60%      { transform: rotate(3deg) scale(1.02); }
  75%      { transform: rotate(-2deg) scale(1); }
}
.ks-back {

  display:flex;align-items:center;gap:7px;

  background:rgba(255,255,255,0.88);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border:1px solid rgba(0,0,0,0.09);border-radius:99px;

  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;

.ks-back img{width:26px;height:26px;border-radius:50%;display:block}
@media print{.ks-back{display:none !important}}
body{padding-top:48px !important}
@media print{body{padding-top:0 !important}}
</style>

    setTimeout(function(){
      btn.classList.add('wiggle');
      btn.addEventListener('animationend',function onEnd(){

<div class="page-header">
  <div class="eyebrow">Kevin Supply Hub</div>
  <h1>理財<span>計算工具</span></h1>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchSection('dsp5')">DSP5 計算機</button>
  <button class="tab" onclick="switchSection('techFund')">科技基金</button>
  <button class="tab" onclick="switchSection('leverage')">房貸槓桿</button>
</div>

<div class="wrapper">

  <!-- DSP5 -->
  <section id="dsp5" class="card" style="--accent:var(--brand)">
    <h2>DSP5 計算機</h2>
    <p class="desc">輸入預計投入金額與淨值，自動獲取匯率並計算每月配息</p>
    <div class="form-group">
      <label for="dsp5Investment">預計投入金額（NTD）</label>
      <input type="number" id="dsp5Investment" placeholder="例如 1,000,000" min="0" step="100">
    </div>
    <div class="form-group">
      <label for="dsp5NetValue">假設淨值（每單位）</label>
      <input type="number" id="dsp5NetValue" placeholder="例如 8.5" min="0" step="0.01">
    </div>
    <button class="btn" onclick="calculateDSP5()">開始計算</button>
    <div class="result" id="dsp5Result"></div>
    <div class="dsp5-notes">
      <h3>注意事項</h3>
      <ul>
        <li>1. <a href="https://invest.fubonlife.com.tw/w/wb/wb02.djhtm?a=TLZ64-DSP5" target="_blank">點擊此處查看最新淨值</a></li>
        <li>2. 匯率由系統自動更新<span id="dsp5ExchangeRateInfo"></span></li>
        <li>3. 手續費已自動扣除</li>
        <li>4. 本試算僅供參考</li>
      </ul>
    </div>
  </section>

  <!-- 科技基金 -->
  <section id="techFund" class="card hidden" style="--accent:var(--emerald)">
    <h2>美國科技基金・長期買進預估</h2>
    <p class="desc">設定每月投入金額與年期，預估長期資產成長</p>
    <div class="form-group">
      <label for="techInvestment">每月投入金額（NTD）</label>
      <input type="number" id="techInvestment" placeholder="例如 10,000" min="0">
    </div>
    <div class="form-group">
      <label for="techYears">持續買進年期（年）</label>
      <input type="number" id="techYears" placeholder="例如 10" min="1" max="30">
    </div>
    <button class="btn" style="background:var(--emerald);box-shadow:0 4px 16px rgba(16,185,129,0.25)" onclick="calculateTechFund()">開始計算</button>
    <div class="result" id="techResult"></div>
  </section>

  <!-- 房貸槓桿 -->
  <section id="leverage" class="card hidden" style="--accent:var(--amber)">
    <h2>房貸槓桿投資計算機</h2>
    <p class="desc">評估轉增貸後的可用現金與現金流</p>
    <div class="form-group">
      <label for="originalLoan">原始貸款（萬元）</label>
      <input type="number" id="originalLoan" placeholder="例如 800" min="0">
    </div>
    <div class="form-group">
      <label for="originalMonthlyPayment">原始月付金（萬元）</label>
      <input type="number" id="originalMonthlyPayment" placeholder="例如 3" min="0" step="0.01">
    </div>
    <div class="form-group">
      <label for="refinanceAmount">轉增貸金額（萬元）</label>
      <input type="number" id="refinanceAmount" placeholder="例如 1000" min="0">
    </div>
    <div class="form-group">
      <label for="refinanceRate">轉貸利率（%）</label>
      <input type="number" id="refinanceRate" placeholder="例如 2.5" min="0" step="0.01">
    </div>
    <button class="btn" style="background:var(--amber);box-shadow:0 4px 16px rgba(245,158,11,0.25)" onclick="calculateLeverage()">開始計算</button>
    <div class="result" id="leverageResult"></div>
  </section>

  <div class="page-footer">由 <span>Keri</span> 整理製作 · 2026</div>

</div>

<div class="loading-emoji" id="loadingEmoji">💰</div>

<script>
const DISCOUNT_RATES = [
    { min: 0, max: 2000000, rate: 0.95 },
    { min: 2000000, max: 5000000, rate: 0.96 },
    { min: 5000000, max: 10000000, rate: 0.97 },
    { min: 10000000, max: Infinity, rate: 0.98 }
];

function validateInput(...values) {
    return values.every(val => !isNaN(val) && val >= 0);
}

function getDiscountRate(amount) {
    return DISCOUNT_RATES.find(({ min, max }) => amount >= min && amount < max).rate;
}

async function fetchExchangeRate() {
    try {
        const response = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await response.json();
        if (data.result === 'success') {
            const rate = data.rates.TWD;
            const dateTime = new Date(data.time_last_update_utc).toLocaleString('zh-TW', { dateStyle: 'short', timeStyle: 'short' });
            return { rate, dateTime };
        }
        throw new Error('無法獲取匯率數據');
    } catch (error) {
        console.error('匯率 API 錯誤:', error);
        alert('無法獲取匯率數據，請稍後再試！');
        return null;
    }
}

async function calculateDSP5() {
    const investment = parseFloat(document.getElementById('dsp5Investment').value);
    const netValue = parseFloat(document.getElementById('dsp5NetValue').value);
    const resultDiv = document.getElementById('dsp5Result');
    const exchangeRateInfo = document.getElementById('dsp5ExchangeRateInfo');
    const loadingEmoji = document.getElementById('loadingEmoji');

    if (!validateInput(investment, netValue) || netValue === 0) {
        alert('請輸入有效且非負的數字，且淨值不能為 0！');
        return;
    }

    loadingEmoji.classList.add('shaking');
    await new Promise(resolve => setTimeout(resolve, 1000));
    loadingEmoji.classList.remove('shaking');

    const exchangeData = await fetchExchangeRate();
    if (!exchangeData) return;

    const { rate: exchangeRate, dateTime: exchangeDateTime } = exchangeData;
    const adjustedInvestment = investment * getDiscountRate(investment);
    const units = adjustedInvestment / netValue / exchangeRate;
    const monthlyPayout = units * 0.055;

    exchangeRateInfo.innerHTML = ` (${exchangeDateTime}：${exchangeRate.toFixed(2)})`;
    resultDiv.innerHTML = `
        <div class="result-card">
            月配息金額：<hr><span>NT$${Math.round(monthlyPayout * exchangeRate).toLocaleString('zh-TW')}</span>
        </div>
        <div class="result-card">可得單位數：<span>${units.toFixed(2)}</span></div>
        <div class="result-card">每單位配息：<span>0.055</span></div>
        <div class="result-card">當前匯率 (USD/TWD)：<span>${exchangeRate.toFixed(2)}</span></div>
        <div class="result-note">基於當前匯率與每單位配息 0.055 計算，實際結果可能因市場波動而異</div>
    `;
    resultDiv.scrollIntoView({ behavior: 'smooth' });
}

async function calculateTechFund() {
    const monthlyInvestment = parseFloat(document.getElementById('techInvestment').value);
    const baseYears = parseInt(document.getElementById('techYears').value);
    const resultDiv = document.getElementById('techResult');
    const loadingEmoji = document.getElementById('loadingEmoji');

    if (!validateInput(monthlyInvestment, baseYears) || baseYears < 1 || baseYears > 30) {
        alert('請輸入有效的金額和年期（1-30 年）！');
        return;
    }

    loadingEmoji.classList.add('shaking');
    await new Promise(resolve => setTimeout(resolve, 1000));
    loadingEmoji.classList.remove('shaking');

    const annualReturnRate = 0.08;
    const periods = [baseYears, baseYears + 5, baseYears + 10, baseYears + 15].filter(y => y <= 30);

    resultDiv.innerHTML = '';
    periods.forEach(years => {
        const months = years * 12;
        const totalCost = monthlyInvestment * months;
        const futureValue = monthlyInvestment * ((Math.pow(1 + annualReturnRate / 12, months) - 1) / (annualReturnRate / 12));
        const formattedCost = totalCost.toLocaleString('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 });
        const formattedValue = futureValue.toLocaleString('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 });

        resultDiv.innerHTML += `
            <div class="result-card">
                <span class="result-card-title">持續買進 ${years} 年</span><hr>
                總投入成本 <span>${formattedCost}</span><br>
                預估資產終值 <span>${formattedValue}</span>
            </div>
        `;
    });

    resultDiv.innerHTML += `
        <div class="result-note">
            備註：基於美國科技股長期平均年化報酬保守 8% 計算<br>實際報酬可能因市場波動而異
        </div>
    `;
    resultDiv.scrollIntoView({ behavior: 'smooth' });
}

async function calculateLeverage() {
    const originalLoan = parseFloat(document.getElementById('originalLoan').value) * 10000 || 0;
    const originalMonthlyPayment = parseFloat(document.getElementById('originalMonthlyPayment').value) * 10000 || 0;
    const refinanceAmount = parseFloat(document.getElementById('refinanceAmount').value) * 10000 || 0;
    const refinanceRate = parseFloat(document.getElementById('refinanceRate').value) / 100 || 0;
    const resultDiv = document.getElementById('leverageResult');
    const loadingEmoji = document.getElementById('loadingEmoji');

    if (!validateInput(originalLoan, originalMonthlyPayment, refinanceAmount, refinanceRate)) {
        alert('請輸入有效的數字，且不得為負值！');
        return;
    }

    loadingEmoji.classList.add('shaking');
    await new Promise(resolve => setTimeout(resolve, 1000));
    loadingEmoji.classList.remove('shaking');

    const cashAvailable = refinanceAmount - originalLoan;
    const gracePeriodPayment = (refinanceAmount * refinanceRate) / 12;
    const cashFlow = (((refinanceAmount - originalLoan) * 0.95 / 8.5) * 0.055) - gracePeriodPayment;

    resultDiv.innerHTML = `
        <div class="result-card" style="padding:0;border-left:3px solid var(--amber);overflow:hidden">
            <table class="lev-table">
                <tr><th>項目</th><th>金額</th></tr>
                <tr><td>可拿現金</td><td>NT$${cashAvailable.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</td></tr>
                <tr><td>寬限期月付金</td><td>NT$${gracePeriodPayment.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</td></tr>
                <tr><td>可創造現金流</td><td>NT$${cashFlow.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</td></tr>
            </table>
        </div>
        <div class="result-note">
            備註：基於轉貸利率 ${refinanceRate * 100}% 和特定投資假設計算<br>實際結果可能因市場波動而異
        </div>
    `;
    resultDiv.scrollIntoView({ behavior: 'smooth' });
}

function switchSection(sectionId) {
    document.getElementById('dsp5').classList.add('hidden');
    document.getElementById('techFund').classList.add('hidden');
    document.getElementById('leverage').classList.add('hidden');
    document.getElementById(sectionId).classList.remove('hidden');

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const labels = { dsp5: 0, techFund: 1, leverage: 2 };
    document.querySelectorAll('.tab')[labels[sectionId]].classList.add('active');

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        if (!document.getElementById('dsp5').classList.contains('hidden')) {
            calculateDSP5();
        } else if (!document.getElementById('techFund').classList.contains('hidden')) {
            calculateTechFund();
        } else {
            calculateLeverage();
        }
    }
});

switchSection('dsp5');
</script>
</body>
</html>
