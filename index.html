<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理財計算工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Galada&family=Montserrat:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="apple-touch-icon.png"> <!-- 添加 iPhone 主畫面圖標 -->
    <style>
        :root {
            --dsp5-gradient: linear-gradient(90deg, #0093C1, #64b5f6);
            --tech-gradient: linear-gradient(90deg, #2e7d32, #66bb6a);
            --lever-gradient: linear-gradient(135deg, #ff8c42, #ffb347);
            --dsp5-highlight: #ff9800;
            --tech-highlight: #fff;
            --lever-highlight: #fff;
            --text-color: #fff;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --card-bg-dsp5: rgba(255, 255, 255, 0.25);
            --card-bg-tech: rgba(255, 255, 255, 0.15);
            --card-bg-lever: rgba(255, 245, 238, 0.2);
            --lever-border: #ff8c42;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', 'Montserrat', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #355c7d, #1e3c72);
            padding: 20px 20px 80px;
            position: relative;
        }

        #leverage {
            background: linear-gradient(135deg, #ff6f61, #6b5b95);
        }

        .container {
            background: var(--glass-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 0.8s ease-in-out;
        }

        #leverage.container {
            background: var(--card-bg-lever);
            max-width: 500px;
            border: 2px solid var(--lever-border);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 1.8rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
            text-align: center;
            font-weight: 700;
            letter-spacing: 1.2px;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        label {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        input, select {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.85);
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }

        #leverage input, #leverage select {
            background: #fff5ee;
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: scale(1.02);
            background: #fff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        #dsp5 button {
            background: var(--dsp5-gradient);
            box-shadow: 0 5px 20px rgba(0, 147, 193, 0.4);
        }

        #dsp5 button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 147, 193, 0.6);
            background: linear-gradient(90deg, #64b5f6, #0093C1);
        }

        #techFund button {
            background: var(--tech-gradient);
            box-shadow: 0 5px 20px rgba(46, 125, 50, 0.4);
        }

        #techFund button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(46, 125, 50, 0.6);
            background: linear-gradient(90deg, #66bb6a, #2e7d32);
        }

        #leverage button {
            background: var(--lever-gradient);
            box-shadow: 0 5px 20px rgba(255, 140, 66, 0.5);
        }

        #leverage button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 140, 66, 0.7);
            background: linear-gradient(135deg, #ffb347, #ff8c42);
        }

        .result {
            margin-top: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .result-card {
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease-in-out;
            transition: transform 0.2s ease;
        }

        #dsp5 .result-card {
            background: var(--card-bg-dsp5);
            backdrop-filter: blur(5px);
            font-size: 1.2rem;
            font-weight: 700;
        }

        #dsp5 .result-card span {
            color: var(--dsp5-highlight);
            font-size: 1.4rem;
            font-weight: 700;
        }

        #dsp5 .result-card:hover {
            transform: scale(1.02);
        }

        #techFund .result-card {
            background: var(--card-bg-tech);
            position: relative;
        }

        #techFund .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--tech-gradient);
            border-radius: 12px 12px 0 0;
        }

        #techFund .result-card:hover {
            transform: scale(1.02);
        }

        #techFund .result-card span {
            color: var(--tech-highlight);
            font-weight: 700;
        }

        #leverage table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #leverage th, #leverage td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 140, 66, 0.6);
        }

        #leverage th {
            background: rgba(255, 140, 66, 0.3);
            font-weight: 700;
        }

        #leverage tr:nth-child(even) td {
            background: rgba(255, 245, 238, 0.1);
        }

        #leverage tr:nth-child(odd) td {
            background: rgba(255, 245, 238, 0.2);
        }

        .result-card hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin: 0.8rem 0;
        }

        .result-card-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }

        .result-note {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.5;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        #leverage .result-note {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hidden {
            display: none;
        }

        .watermark {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Galada', cursive;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.3);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        .menu {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .menu-btn {
            width: 50px;
            height: 50px;
            background: var(--dsp5-gradient);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 147, 193, 0.4);
        }

        .menu-btn.open {
            transform: rotate(45deg);
        }

        .menu-options {
            position: absolute;
            bottom: 60px;
            right: 0;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .menu-options button {
            width: 150px;
            padding: 0.6rem;
            font-size: 1rem;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .menu-options button#dsp5Btn {
            background: var(--dsp5-gradient);
            box-shadow: 0 4px 15px rgba(0, 147, 193, 0.4);
        }

        .menu-options button#techBtn {
            background: var(--tech-gradient);
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
        }

        .menu-options button#leverBtn {
            background: var(--lever-gradient);
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.4);
        }

        .menu-options button:hover {
            transform: translateY(-2px);
        }

        .menu.open .menu-options {
            display: flex;
        }

        .dsp5-container {
            display: flex;
            gap: 2rem;
            max-width: 600px;
        }

        .dsp5-left {
            flex: 1;
        }

        .dsp5-right {
            width: 200px;
            font-size: 0.9rem;
        }

        .dsp5-notes-list {
            list-style: none;
        }

        .dsp5-notes-list li {
            margin-bottom: 1rem;
        }

        .dsp5-notes-list a {
            color: var(--text-color);
            text-decoration: underline;
            font-style: italic;
        }

        .dsp5-notes-list a:hover {
            text-decoration: underline;
        }

        .dsp5-notes-list li:first-child {
            font-size: 1rem;
        }

        .loading-emoji {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20rem;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0% { transform: translate(-50%, -50%) translateX(0); }
            20% { transform: translate(-50%, -50%) translateX(-10px); }
            40% { transform: translate(-50%, -50%) translateX(10px); }
            60% { transform: translate(-50%, -50%) translateX(-10px); }
            80% { transform: translate(-50%, -50%) translateX(10px); }
            100% { transform: translate(-50%, -50%) translateX(0); }
        }

        .shaking {
            display: block;
            animation: shake 1s ease-in-out;
        }

        @media (max-width: 600px) {
            .dsp5-container {
                flex-direction: column;
                max-width: 450px;
            }
            .dsp5-right {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            label {
                font-size: 1rem;
            }
            input, select, button {
                font-size: 1rem;
                padding: 0.8rem;
            }
            .result-card {
                font-size: 0.9rem;
            }
            #dsp5 .result-card {
                font-size: 1rem;
            }
            #dsp5 .result-card span {
                font-size: 1.2rem;
            }
            table {
                font-size: 0.9rem;
            }
            th, td {
                padding: 0.6rem;
            }
            .result-note {
                font-size: 0.8rem;
            }
            .dsp5-right {
                font-size: 0.8rem;
            }
            .dsp5-notes-list li:first-child {
                font-size: 0.9rem;
            }
            .menu-options button {
                width: 120px;
                font-size: 0.9rem;
                padding: 0.5rem;
            }
            .watermark {
                font-size: 1rem;
            }
            .loading-emoji {
                font-size: 15rem;
            }
        }
    </style>
</head>
<body>

<!-- Kevin Supply Hub Back Button -->
<style>
@keyframes ks-wiggle {
  0%,100% { transform: rotate(0deg) scale(1); }
  15%      { transform: rotate(-6deg) scale(1.05); }
  30%      { transform: rotate(5deg) scale(1.05); }
  45%      { transform: rotate(-4deg) scale(1.02); }
  60%      { transform: rotate(3deg) scale(1.02); }
  75%      { transform: rotate(-2deg) scale(1); }
}
.ks-back {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px 5px 5px;
  background: rgba(255,255,255,0.88);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,0,0,0.09);
  border-radius: 99px;
  text-decoration: none;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
  font-size: 12px;
  font-weight: 700;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  transform-origin: left center;
}
.ks-back:hover {
  transform: scale(1.3);
  box-shadow: 0 6px 24px rgba(0,0,0,0.18);
}
.ks-back.wiggle {
  animation: ks-wiggle 0.6s ease;
}
.ks-back img { width: 26px; height: 26px; border-radius: 50%; display: block; }
</style>
<a class="ks-back" id="ksBack" href="https://kevinyicheng.github.io/kevin-supply-hub/">
  <img src="https://kevinyicheng.github.io/kevin-supply-hub/apple-touch-icon.png" alt="Kevin" />
  返回Kevin Supply Hub
</a>
<script>
(function(){
  const btn = document.getElementById('ksBack');
  function scheduleWiggle() {
    const delay = 4000 + Math.random() * 8000; // 4~12秒不定時
    setTimeout(function() {
      btn.classList.add('wiggle');
      btn.addEventListener('animationend', function onEnd() {
        btn.classList.remove('wiggle');
        btn.removeEventListener('animationend', onEnd);
        scheduleWiggle();
      });
    }, delay);
  }
  scheduleWiggle();
})();
</script>


</body>
</html>
